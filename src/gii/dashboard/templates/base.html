<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GII{% endblock %} — Global Interconnectedness Index</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <nav class="bg-indigo-700 text-white px-6 py-3 flex items-center gap-6">
        <a href="/" class="text-lg font-bold tracking-tight">GII</a>
        <a href="/" class="hover:text-indigo-200 text-sm">Dashboard</a>
        <a href="/rankings" class="hover:text-indigo-200 text-sm">Rankings</a>
        <a href="/admin/pipelines" class="hover:text-indigo-200 text-sm">Pipelines</a>
        <a href="/docs" class="hover:text-indigo-200 text-sm ml-auto">API Docs</a>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
